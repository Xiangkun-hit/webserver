<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>表单提交</title>
</head>
<body>
    <h1>📝 用户输入表单</h1>
    <!-- 表单：输入名字，点击提交，数据发给服务器 -->
    <form action="/" method="get">
        <p>请输入你的名字：</p>
        <input type="text" name="name" placeholder="输入名字">
        <button type="submit">提交给服务器</button>
    </form>
</body>
</html>
