<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>POST表单提交</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <h1>📝 POST表单(安全提交)</h1>
    <img src="/test.png" width="200">
    <!-- POST提交，参数不显示在网址 -->
    <form action="/submit" method="post">
        <p>请输入你的名字：</p>
        <input type="text" name="name" placeholder="输入名字">
        <button type="submit">POST提交</button>
    </form>
</body>
</html>
